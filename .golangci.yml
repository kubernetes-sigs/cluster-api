version: "2"
run:
  timeout: 10m
  go: "1.26"
  build-tags:
    - tools
    - e2e
  allow-parallel-runners: true
linters:
  default: none
  enable:
    - asasalint # warns about passing []any to func(...any) without expanding it
    - asciicheck # non ascii symbols
    - bidichk # dangerous unicode sequences
    - bodyclose # unclosed http bodies
    - containedctx # context.Context nested in a struct
    - copyloopvar # copying loop variables
    - dogsled # too many blank identifiers in assignments
    - dupword # duplicate words
    - durationcheck # multiplying two durations
    - errcheck # unchecked errors
    - errchkjson # invalid types passed to json encoder
    - forbidigo # allows to block usage of funcs
    - ginkgolinter # ginkgo and gomega
    - gocritic # bugs, performance, style (we could add custom ones to this one)
    - godot # checks that comments end in a period
    - godox # block FIXMEs
    - depguard # blocks dependencies
    - goprintffuncname # printft-like functions should be named with f at the end
    - gosec # potential security problems
    - govet # basically 'go vet'
    - importas # consistent import aliases
    - ineffassign # ineffectual assignments
    - intrange # suggest using integer range in for loops
    - loggercheck # check for even key/value pairs in logger calls
    - misspell # spelling
    - nakedret # naked returns (named return parameters and an empty return)
    - nilerr # returning nil after checking err is not nil
    - noctx # http requests without context.Context
    - nolintlint # badly formatted nolint directives
    - nosprintfhostport # using sprintf to construct host:port in a URL
    - prealloc # suggest preallocating slices
    - predeclared # shadowing predeclared identifiers
    - revive # better version of golint
    - staticcheck # some of staticcheck's rules
    - thelper # test helpers not starting with t.Helper()
    - unconvert # unnecessary type conversions
    - unparam # unused function parameters
    - unused # unused constants, variables,functions, types
    - usestdlibvars # using variables/constants from the standard library
    - usetesting # report function to be replace by testing
    - whitespace # unnecessary newlines
  disable:
    # TODO: It will be dropped when the Go version migration is done.
    - usetesting
  settings:
    depguard:
      rules:
        api:
          list-mode: strict
          files:
          - "**/cluster-api/api/**/*.go"
          allow:
          - $gostd
          - k8s.io/api/core/v1$
          - k8s.io/apiextensions-apiserver/pkg/apis/apiextensions/v1$
          - k8s.io/apimachinery/pkg/apis/meta/v1$
          - k8s.io/apimachinery/pkg/conversion$
          - k8s.io/apimachinery/pkg/runtime$
          - k8s.io/apimachinery/pkg/runtime/schema$
          - k8s.io/apimachinery/pkg/types$
          - k8s.io/apimachinery/pkg/util/intstr$
          - k8s.io/cluster-bootstrap/token/api$
          - k8s.io/cluster-bootstrap/token/util$
          - k8s.io/kube-openapi
          - sigs.k8s.io/cluster-api/api
          # TODO: Remove these imports (or at least consider it)
          - k8s.io/apimachinery/pkg/api/validation$
          - k8s.io/apimachinery/pkg/apis/meta/v1/validation$
          - k8s.io/apimachinery/pkg/labels$
          - k8s.io/apimachinery/pkg/util/naming$
          - k8s.io/apimachinery/pkg/util/validation/field$
        cmd_clusterctl_api:
          list-mode: strict
          files:
            - "**/cluster-api/cmd/clusterctl/api/**/*.go"
          allow:
            - $gostd
            - github.com/blang/semver/v4$
            - github.com/onsi/gomega$
            - k8s.io/apimachinery/pkg/apis/meta/v1$
            - k8s.io/apimachinery/pkg/runtime$
            - k8s.io/apimachinery/pkg/runtime/schema$
            - k8s.io/apimachinery/pkg/types$
            - k8s.io/apimachinery/pkg/util/version$
        test_extension:
          list-mode: strict
          files:
            - "**/cluster-api/test/extension/**/*.go"
          allow:
            - $gostd
            - github.com/blang/semver/v4$
            - github.com/onsi/gomega$
            - github.com/pkg/errors$
            - gomodules.xyz/jsonpatch/v2$
            - k8s.io/api/core/v1$
            - k8s.io/apiextensions-apiserver/pkg/apis/apiextensions/v1$
            - k8s.io/apimachinery
            - k8s.io/client-go
            - k8s.io/component-base
            - k8s.io/klog
            - k8s.io/utils
            - sigs.k8s.io/cluster-api/api
            - sigs.k8s.io/cluster-api/controllers/clustercache$
            - sigs.k8s.io/cluster-api/controllers/remote$
            - sigs.k8s.io/cluster-api/core/reconcilers/clusterclass$
            - sigs.k8s.io/cluster-api/core/webhooks/admission$
            - sigs.k8s.io/cluster-api/exp/runtime/client$
            - sigs.k8s.io/cluster-api/exp/runtime/server$
            - sigs.k8s.io/cluster-api/exp/runtime/topologymutation$
            - sigs.k8s.io/cluster-api/exp/topology/desiredstate$
            - sigs.k8s.io/cluster-api/exp/topology/scope$
            - sigs.k8s.io/cluster-api/feature$
            - sigs.k8s.io/cluster-api/test/extension
            - sigs.k8s.io/cluster-api/test/infrastructure/docker/api
            - sigs.k8s.io/cluster-api/test/infrastructure/kind$
            - sigs.k8s.io/cluster-api/util/cache$
            - sigs.k8s.io/cluster-api/util/conditions$
            - sigs.k8s.io/cluster-api/util/contract$
            - sigs.k8s.io/cluster-api/util/flags$
            - sigs.k8s.io/cluster-api/util/util$
            - sigs.k8s.io/cluster-api/version$
            - sigs.k8s.io/controller-runtime
            - sigs.k8s.io/yaml
    forbidigo:
      forbid:
        - pattern: ctrl.NewControllerManagedBy
          msg: Use capicontrollerutil.NewControllerManagedBy instead
    ginkgolinter:
      forbid-focus-container: true
    gocritic:
      disabled-checks:
        - appendAssign
        - dupImport # https://github.com/go-critic/go-critic/issues/845
        - evalOrder
        - ifElseChain
        - octalLiteral
        - regexpSimplify
        - sloppyReassign
        - truncateCmp
        - typeDefFirst
        - unnamedResult
        - unnecessaryDefer
        - whyNoLint
        - wrapperFunc
        - rangeValCopy
        - hugeParam
      enabled-tags:
        - diagnostic
        - experimental
        - performance
    godot:
      #   declarations - for top level declaration comments (default);
      #   toplevel     - for top level comments;
      #   all          - for all comments.
      scope: toplevel
      exclude:
        - ^ \+.*
        - ^ ANCHOR.*
        - '^ (alpha|beta|GA): v.*'
    godox:
      keywords:
        - FIXME # FIXME's should be removed before merging PRs
    gosec:
      excludes:
      # integer overflow conversion int -> int32
        - G115
    importas:
      alias:
        # Kubernetes
        - pkg: k8s.io/api/core/v1
          alias: corev1
        - pkg: k8s.io/apiextensions-apiserver/pkg/apis/apiextensions/v1
          alias: apiextensionsv1
        - pkg: k8s.io/apimachinery/pkg/apis/meta/v1
          alias: metav1
        - pkg: k8s.io/apimachinery/pkg/api/errors
          alias: apierrors
        - pkg: k8s.io/apimachinery/pkg/util/errors
          alias: kerrors
        - pkg: k8s.io/component-base/logs/api/v1
          alias: logsv1
        # Controller Runtime
        - pkg: sigs.k8s.io/controller-runtime
          alias: ctrl
        # CABPK
        - pkg: sigs.k8s.io/cluster-api/bootstrap/kubeadm/webhooks/admission
          alias: kubeadmbootstrapwebhooks
        - pkg: sigs.k8s.io/cluster-api/api/bootstrap/kubeadm/v1beta1
          alias: bootstrapv1beta1
        - pkg: sigs.k8s.io/cluster-api/api/bootstrap/kubeadm/v1beta2
          alias: bootstrapv1
        # KCP
        - pkg: sigs.k8s.io/cluster-api/controlplane/kubeadm/webhooks/admission
          alias: kubeadmcontrolplanewebhooks
        - pkg: sigs.k8s.io/cluster-api/api/controlplane/kubeadm/v1beta1
          alias: controlplanev1beta1
        - pkg: sigs.k8s.io/cluster-api/api/controlplane/kubeadm/v1beta2
          alias: controlplanev1
        # CAPI
        - pkg: sigs.k8s.io/cluster-api/core/webhooks/admission
          alias: corewebhooks
        - pkg: sigs.k8s.io/cluster-api/api/core/v1beta1
          alias: clusterv1beta1
        - pkg: sigs.k8s.io/cluster-api/api/core/v1beta2
          alias: clusterv1
        # CAPI addons
        - pkg: sigs.k8s.io/cluster-api/api/addons/v1beta1
          alias: addonsv1beta1
        - pkg: sigs.k8s.io/cluster-api/api/addons/v1beta2
          alias: addonsv1
        # CAPI IPAM
        - pkg: sigs.k8s.io/cluster-api/api/ipam/v1beta1
          alias: ipamv1beta1
        - pkg: sigs.k8s.io/cluster-api/api/ipam/v1beta2
          alias: ipamv1
        # CAPI runtime
        - pkg: sigs.k8s.io/cluster-api/api/runtime/v1alpha1
          alias: runtimev1alpha1
        - pkg: sigs.k8s.io/cluster-api/api/runtime/v1beta2
          alias: runtimev1
        - pkg: sigs.k8s.io/cluster-api/api/runtime/catalog
          alias: runtimecatalog
        - pkg: sigs.k8s.io/cluster-api/api/runtime/hooks/v1alpha1
          alias: runtimehooksv1
        - pkg: sigs.k8s.io/cluster-api/exp/runtime/controllers
          alias: runtimecontrollers
        - pkg: sigs.k8s.io/cluster-api/internal/runtime/client
          alias: internalruntimeclient
        - pkg: sigs.k8s.io/cluster-api/exp/runtime/client
          alias: runtimeclient
        - pkg: sigs.k8s.io/cluster-api/internal/runtime/registry
          alias: runtimeregistry
        - pkg: sigs.k8s.io/cluster-api/internal/webhooks/runtime
          alias: runtimewebhooks
        # CAPI utils
        - pkg: sigs.k8s.io/cluster-api/util/conversion
          alias: conversionutil
        - pkg: sigs.k8s.io/cluster-api/util/conditions/deprecated/v1beta1
          alias: v1beta1conditions
        - pkg: sigs.k8s.io/cluster-api/util/conditions
          alias: ""
        - pkg: sigs.k8s.io/cluster-api/util/patch
          alias: ""
        - pkg: sigs.k8s.io/cluster-api/internal/topology/names
          alias: topologynames
        - pkg: sigs.k8s.io/cluster-api/util/controller
          alias: capicontrollerutil
        # CAPD
        - pkg: sigs.k8s.io/cluster-api/test/infrastructure/docker/api/v1beta1
          alias: infrav1beta1
        - pkg: sigs.k8s.io/cluster-api/test/infrastructure/docker/api/v1beta2
          alias: infrav1
      no-unaliased: true
    nolintlint:
      require-specific: true
      allow-unused: false
    revive:
      rules:
        # The following rules are recommended https://github.com/mgechev/revive#recommended-configuration
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
        - name: unreachable-code
        - name: redefines-builtin-id
        #
        # Rules in addition to the recommended configuration above.
        #
        - name: bool-literal-in-expr
        - name: constant-logical-expr
  exclusions:
    generated: strict
    paths:
      - zz_generated.*\.go$
      - vendored_openapi\.go$
    rules:
      # TODO: Excludes that can be removed as part of the Cluster API v1.15 release.
      - linters:
          - staticcheck
        text: 'SA1019: feature.MachineWaitForVolumeDetachConsiderVolumeAttachments is deprecated'

      # TODO: Excludes that can be removed once we bumped to controller-runtime v0.25.
      - linters:
          - staticcheck
        text: 'SA1019: (env|mgr).GetEventRecorderFor is deprecated'

      # TODO: Excludes for v1beta1, can be removed once v1beta1 has been removed (current plan: Cluster API v1.19).
      - linters:
          - staticcheck
        text: 'SA1019: (clusterv1.ClusterClassVariableMetadata|currentDefinition.DeprecatedV1Beta1Metadata|newVariableDefinition.DeprecatedV1Beta1Metadata|specVar.DeprecatedV1Beta1Metadata|statusVarDefinition.DeprecatedV1Beta1Metadata|out.DeprecatedV1Beta1Metadata|variable.DeprecatedV1Beta1Metadata) is deprecated'
      - linters:
          - staticcheck
        text: 'SA1019: .* is deprecated: This package is deprecated and is going to be removed when support for v1beta1 will be dropped.'
      - linters:
          - staticcheck
        text: 'SA1019: .*\.Deprecated\.V1Beta1.* is deprecated'
      - linters:
          - staticcheck
        text: 'SA1019: clusterv1\.(Condition|Conditions|ConditionSeverity|ConditionType) is deprecated'
      - linters:
          - staticcheck
        text: 'SA1019: .* is deprecated|'
        path: util/deprecated/v1beta1/.*\.go$
      - linters:
          - staticcheck
        text: "QF1001: could apply De Morgan's law"
        path: util/deprecated/v1beta1/.*\.go$
      - linters:
          - importas
        text: 'imported as ".*" but must be ".*" according to config'
        path: util/deprecated/v1beta1/.*\.go$

      # TODO: Excludes for Docker*, can be removed when Docker* API types have been removed.
      - linters:
          - staticcheck
        text: 'SA1019: .*Docker.* is deprecated: .* Use Dev.* instead\.'

      # TODO: Excludes that can be removed once the code organization proposal has been implemented.
      - linters:
          - revive
        text: 'exported: exported method .*\.(Reconcile|SetupWithManager|SetupWebhookWithManager) should have comment or be unexported'

      # Exclude rules that we are going to keep permanently.
      - linters:
          - revive
        text: 'var-naming: avoid meaningless package names'
        path: test/infrastructure/docker/internal/docker/types/.*\.go$|bootstrap/kubeadm/pkg/types/.*\.go$|util/.*\.go$|exp/util/.*\.go$|controlplane/kubeadm/pkg/etcd/util/.*\.go$|cmd/clusterctl/internal/util/.*\.go$|bootstrap/util/.*\.go$
      - linters:
          - errcheck
        text: Error return value of .((os\.)?std(out|err)\..*|.*Close|.*Flush|os\.Remove(All)?|.*print(f|ln)?|os\.(Un)?Setenv). is not checked
      ## Exclude some packages or code to require comments, for example test code, or fake clients.
      - linters:
          - revive
        text: exported (method|function|type|const) (.+) should have comment or be unexported
        source: (func|type).*Fake.*
      - linters:
          - revive
        path: fake_\.go
        text: exported (method|function|type|const) (.+) should have comment or be unexported
      - linters:
          - revive
        path: cmd/clusterctl/internal/test/providers.*.go
        text: exported (method|function|type|const) (.+) should have comment or be unexported
      - linters:
          - revive
        path: (framework|e2e)/.*.go
        text: exported (method|function|type|const) (.+) should have comment or be unexported
      ## Disable unparam "always receives" which might not be really useful when building libraries.
      - linters:
          - unparam
        text: always receives
      ## Dot imports for gomega and ginkgo are allowed within test files and test utils.
      - linters:
          - revive
          - staticcheck
        path: _test\.go
        text: should not use dot imports
      - linters:
          - revive
          - staticcheck
        path: (framework|e2e)/.*.go
        text: should not use dot imports
      ## Large parts of this file are duplicate from k/k. Let's ignore "emptyStringTest" to reduce the noise in diffs
      ## and to avoid making mistakes by diverging from upstream just because of this purely stylistic linter finding.
      - linters:
          - gocritic
        path: internal/topology/variables/clusterclass_variable_validation.go
        text: emptyStringTest
      ## Append should be able to assign to a different var/slice.
      - linters:
          - gocritic
        text: 'appendAssign: append result not assigned to the same slice'
      ## Disable linters for conversion
      - linters:
          - staticcheck
        path: api/core/v1beta1/conversion.go|webhooks/conversion/.*\.go
        text: 'SA1019: in.(.+) is deprecated'
      - linters:
          - revive
        # Ignoring stylistic checks for generated code
        path: .*(api|types|test)\/.*\/conversion.*\.go$
        # Exported function and methods should have comments. This warns on undocumented exported functions and methods.
        text: exported (method|function|type|const) (.+) should have comment or be unexported
      - linters:
          - revive
        # Ignoring stylistic checks for generated code
        path: .*(api|types|test)\/.*\/conversion.*\.go$
        # This rule warns when initialism, variable or package naming conventions are not followed.
        text: 'var-naming: don''t use underscores in Go names;'
      - linters:
          - revive
        # Ignoring stylistic checks for generated code
        path: bootstrap/kubeadm/pkg/types/upstreamv1beta3/conversion.go|bootstrap/kubeadm/pkg/types/upstreamv1beta4/conversion.go|internal/topology/upgrade/test/t1/v1beta1/conversion.go|internal/topology/upgrade/test/t2/v1beta1/conversion.go|test/infrastructure/docker/api/v1beta1/conversion.go
        # By convention, receiver names in a method should reflect their identity.
        text: 'receiver-naming: receiver name'
      - linters:
          - staticcheck
        path: .*(api|types|test)\/.*\/conversion.*\.go$
        text: 'ST1003: should not use underscores in Go names;'
      - linters:
          - staticcheck
        path: .*(api|types)\/.*\/conversion.*\.go$
        text: 'ST1016: methods on the same type should have the same receiver name'
      ## We don't care about defer in for loops in test files.
      - linters:
          - gocritic
        path: _test\.go
        text: 'deferInLoop: Possible resource leak, ''defer'' is called in the ''for'' loop'
      - linters:
          - goconst
        path: (.+)_test\.go
      ## It's clearer to see that a field gets accessed or func gets called on the embedded objects
      - linters:
          - staticcheck
        path: (.+)\.go$
        text: 'QF1008: could remove embedded field'
      ## Exclude G101 findings in test files: test fixtures legitimately contain fake credentials.
      - linters:
          - gosec
        path: _test\.go
        text: 'G101:'
      ## Preallocating slices in test files is not worth the effort and readability cost.
      - linters:
          - prealloc
        path: _test\.go
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gci # ensures imports are organized
    - gofmt # warns about incorrect use of fmt functions
    - goimports # import formatting
  settings:
    gci:
      sections:
        - standard # Standard section: captures all standard packages.
        - default # Default section: contains all imports that could not be matched to another section type.
        - prefix(sigs.k8s.io/cluster-api) # Custom section: groups all imports with the specified Prefix.
      custom-order: true
  exclusions:
    generated: strict
    paths:
      - zz_generated.*\.go$
      - vendored_openapi\.go$
