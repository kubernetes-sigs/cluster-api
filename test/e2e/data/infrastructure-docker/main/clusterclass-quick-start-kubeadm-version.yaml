apiVersion: cluster.x-k8s.io/v1beta2
kind: ClusterClass
metadata:
  name: quick-start-kubeadm-version
spec:
  controlPlane:
    templateRef:
      apiVersion: controlplane.cluster.x-k8s.io/v1beta2
      kind: KubeadmControlPlaneTemplate
      name: kubeadm-version-control-plane
    machineInfrastructure:
      templateRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
        kind: DockerMachineTemplate
        name: kubeadm-version-control-plane
  infrastructure:
    templateRef:
      apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
      kind: DockerClusterTemplate
      name: kubeadm-version-cluster
  workers:
    machineDeployments:
    - class: default-worker
      bootstrap:
        templateRef:
          apiVersion: bootstrap.cluster.x-k8s.io/v1beta2
          kind: KubeadmConfigTemplate
          name: kubeadm-version-default-worker-bootstraptemplate
      infrastructure:
        templateRef:
          apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
          kind: DockerMachineTemplate
          name: kubeadm-version-default-worker-machinetemplate
  variables:
  - name: lbImageRepository
    required: true
    schema:
      openAPIV3Schema:
        type: string
        default: kindest
  - name: etcdImageTag
    required: true
    schema:
      openAPIV3Schema:
        type: string
        default: ""
        example: "3.5.3-0"
        description: "etcdImageTag sets the tag for the etcd image."
  - name: coreDNSImageTag
    required: true
    schema:
      openAPIV3Schema:
        type: string
        default: ""
        example: "v1.8.5"
        description: "coreDNSImageTag sets the tag for the coreDNS image."
  - name: preLoadImages
    required: false
    schema:
      openAPIV3Schema:
        default: []
        type: array
        items:
          type: string
        description: "preLoadImages sets the images for the docker machines to preload."
  patches:
  - name: lbImageRepository
    definitions:
    - selector:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
        kind: DockerClusterTemplate
        matchResources:
          infrastructureCluster: true
      jsonPatches:
      - op: add
        path: "/spec/template/spec/loadBalancer"
        valueFrom:
          template: |
            imageRepository: {{ .lbImageRepository }}
  - name: etcdImageTag
    enabledIf: '{{ ne .etcdImageTag "" }}'
    description: "Sets tag to use for the etcd image in the KubeadmControlPlane."
    definitions:
    - selector:
        apiVersion: controlplane.cluster.x-k8s.io/v1beta2
        kind: KubeadmControlPlaneTemplate
        matchResources:
          controlPlane: true
      jsonPatches:
      - op: add
        path: "/spec/template/spec/kubeadmConfigSpec/clusterConfiguration/etcd"
        valueFrom:
          template: |
            local:
              imageTag: {{ .etcdImageTag }}
  - name: coreDNSImageTag
    enabledIf: '{{ ne .coreDNSImageTag "" }}'
    description: "Sets tag to use for the coreDNS image in the KubeadmControlPlane."
    definitions:
    - selector:
        apiVersion: controlplane.cluster.x-k8s.io/v1beta2
        kind: KubeadmControlPlaneTemplate
        matchResources:
          controlPlane: true
      jsonPatches:
      - op: add
        path: "/spec/template/spec/kubeadmConfigSpec/clusterConfiguration/dns"
        valueFrom:
          template: |
            imageTag: {{ .coreDNSImageTag }}
  - name: customImage
    description: "Sets the container image that is used for running dockerMachines for the controlPlane and default-worker machineDeployments."
    definitions:
      - selector:
          apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
          kind: DockerMachineTemplate
          matchResources:
            machineDeploymentClass:
              names:
                - default-worker
        jsonPatches:
          - op: add
            path: "/spec/template/spec/customImage"
            valueFrom:
              template: |
                kindest/node:{{ .builtin.machineDeployment.version | replace "+" "_" }}
      - selector:
          apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
          kind: DockerMachineTemplate
          matchResources:
            controlPlane: true
        jsonPatches:
          - op: add
            path: "/spec/template/spec/customImage"
            valueFrom:
              template: |
                kindest/node:{{ .builtin.controlPlane.version | replace "+" "_" }}
  - name: preloadImages
    description: "Sets the container images to preload to the node that is used for running dockerMachines."
    definitions:
    - selector:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
        kind: DockerMachineTemplate
        matchResources:
          controlPlane: true
          machineDeploymentClass:
            names:
            - default-worker
      jsonPatches:
      - op: add
        path: "/spec/template/spec/preLoadImages"
        valueFrom:
          variable: preLoadImages
  - name: podSecurityStandard
    description: "Adds an admission configuration for PodSecurity to the kube-apiserver."
    definitions:
    - selector:
        apiVersion: controlplane.cluster.x-k8s.io/v1beta2
        kind: KubeadmControlPlaneTemplate
        matchResources:
          controlPlane: true
      jsonPatches:
      - op: add
        path: "/spec/template/spec/kubeadmConfigSpec/clusterConfiguration/apiServer/extraArgs"
        value:
          - name: admission-control-config-file
            value: "/etc/kubernetes/kube-apiserver-admission-pss.yaml"
      - op: add
        path: "/spec/template/spec/kubeadmConfigSpec/clusterConfiguration/apiServer/extraVolumes"
        value:
        - name: admission-pss
          hostPath: /etc/kubernetes/kube-apiserver-admission-pss.yaml
          mountPath: /etc/kubernetes/kube-apiserver-admission-pss.yaml
          readOnly: true
          pathType: "File"
      - op: add
        path: "/spec/template/spec/kubeadmConfigSpec/files"
        valueFrom:
          template: |
            - content: |
                apiVersion: apiserver.config.k8s.io/v1
                kind: AdmissionConfiguration
                plugins:
                - name: PodSecurity
                  configuration:
                    apiVersion: pod-security.admission.config.k8s.io/v1
                    kind: PodSecurityConfiguration
                    defaults:
                      enforce: "baseline"
                      enforce-version: "latest"
                      audit: "baseline"
                      audit-version: "latest"
                      warn: "baseline"
                      warn-version: "latest"
                    exemptions:
                      usernames: []
                      runtimeClasses: []
                      namespaces: [kube-system]
              path: /etc/kubernetes/kube-apiserver-admission-pss.yaml
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: DockerClusterTemplate
metadata:
  name: kubeadm-version-cluster
spec:
  template:
    spec:
      failureDomains:
        - name: fd1
          controlPlane: true
        - name: fd2
          controlPlane: true
        - name: fd3
          controlPlane: true
        - name: fd4
          controlPlane: false
---
kind: KubeadmControlPlaneTemplate
apiVersion: controlplane.cluster.x-k8s.io/v1beta2
metadata:
  name: kubeadm-version-control-plane
spec:
  template:
    spec:
      machineTemplate:
        spec:
          deletion:
            nodeDrainTimeoutSeconds: 1
      kubeadmConfigSpec:
        clusterConfiguration:
          apiServer:
            certSANs: [localhost, host.docker.internal, "::", "::1", "127.0.0.1", "0.0.0.0"]
        initConfiguration:
          nodeRegistration:
            kubeletExtraArgs:
              - name: eviction-hard
                value: 'nodefs.available<0%,nodefs.inodesFree<0%,imagefs.available<0%'
        joinConfiguration:
          nodeRegistration:
            kubeletExtraArgs:
              - name: eviction-hard
                value: 'nodefs.available<0%,nodefs.inodesFree<0%,imagefs.available<0%'
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: DockerMachineTemplate
metadata:
  name: kubeadm-version-control-plane
spec:
  template:
    spec:
      extraMounts:
      - containerPath: "/var/run/docker.sock"
        hostPath: "/var/run/docker.sock"
      preLoadImages: ${DOCKER_PRELOAD_IMAGES:-[]}
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: DockerMachineTemplate
metadata:
  name: kubeadm-version-default-worker-machinetemplate
spec:
  template:
    spec:
      extraMounts:
      - containerPath: "/var/run/docker.sock"
        hostPath: "/var/run/docker.sock"
      preLoadImages: ${DOCKER_PRELOAD_IMAGES:-[]}
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta2
kind: KubeadmConfigTemplate
metadata:
  name: kubeadm-version-default-worker-bootstraptemplate
spec:
  template:
    spec:
      files:
      - path: /run/cluster-api/fetch-kubeadm.sh
        owner: "root:root"
        permissions: "0755"
        contentFormat: go-template
        content: |
          #!/bin/sh
          set -e
          KUBEADM_INSTALL="/usr/bin/kubeadm"
          BASE_URL="https://dl.k8s.io/release"
          version="{{ .KubernetesVersion }}"
          echo "fetch-kubeadm.sh: starting"
          echo "fetch-kubeadm.sh: raw version from template: '$$version'"
          if [ -z "$$version" ]; then
            echo "fetch-kubeadm.sh: ERROR: empty KubernetesVersion in script, aborting"
            exit 1
          fi
          case "$$version" in
            v*) ;;
            *) version="v$$version" ;;
          esac
          current_version=""
          if [ -x "$$KUBEADM_INSTALL" ]; then
            current_version=$$($$KUBEADM_INSTALL version -o short 2>/dev/null || true)
          fi
          if [ "$$current_version" = "$$version" ]; then
            echo "fetch-kubeadm.sh: kubeadm $$version already installed, skipping download"
            exit 0
          fi
          echo "fetch-kubeadm.sh: installed=$$current_version desired=$$version, fetching"
          arch=$$(uname -m)
          case "$$arch" in
            x86_64) arch="amd64" ;;
            aarch64|arm64) arch="arm64" ;;
            *) echo "Unsupported arch: $$arch"; exit 1 ;;
          esac
          url="$${BASE_URL}/$${version}/bin/linux/$${arch}/kubeadm"
          echo "Fetching kubeadm $${version} ($${arch}) from $${url}"
          echo "fetch-kubeadm.sh: curl -fLsS -o <tmpfile> $$url"
          tmp=$$(mktemp -p /tmp kubeadm.XXXXXX)
          if curl -fLsS -o "$$tmp" "$$url"; then
            echo "fetch-kubeadm.sh: download succeeded, installing to $$KUBEADM_INSTALL"
            chmod 755 "$$tmp"
            mv -f "$$tmp" "$$KUBEADM_INSTALL"
            echo "fetch-kubeadm.sh: done, kubeadm installed"
          else
            rc=$$?
            echo "fetch-kubeadm.sh: curl failed with exit code $$rc"
            echo "fetch-kubeadm.sh: trying curl -v to diagnose..."
            curl -v -o /dev/null "$$url" 2>&1 || true
            rm -f "$$tmp"
            exit 1
          fi
      preKubeadmCommands:
      - |
        command -v curl >/dev/null 2>&1 || (apt-get update && apt-get install -y --no-install-recommends curl ca-certificates && rm -rf /var/lib/apt/lists/*)
      - 'sh /run/cluster-api/fetch-kubeadm.sh 2>&1 | tee /var/log/fetch-kubeadm.log || true'
      joinConfiguration:
        nodeRegistration:
          kubeletExtraArgs:
            - name: eviction-hard
              value: 'nodefs.available<0%,nodefs.inodesFree<0%,imagefs.available<0%'
