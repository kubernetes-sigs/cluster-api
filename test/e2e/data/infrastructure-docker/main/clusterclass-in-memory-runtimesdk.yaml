apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: DevClusterTemplate
metadata:
  name: in-memory-runtimesdk-cluster
spec:
  template:
    spec:
      backend:
        inMemory: {}
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta2
kind: KubeadmControlPlaneTemplate
metadata:
  name: in-memory-runtimesdk-control-plane
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: DevMachineTemplate
metadata:
  name: in-memory-runtimesdk-control-plane
spec:
  template:
    spec:
      backend:
        inMemory:
          vm:
            provisioning:
              startupDuration: "10s"
              startupJitter: "0.2"
          node:
            provisioning:
              startupDuration: "2s"
              startupJitter: "0.2"
          apiServer:
            provisioning:
              startupDuration: "2s"
              startupJitter: "0.2"
          etcd:
            provisioning:
              startupDuration: "2s"
              startupJitter: "0.2"
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: DevMachineTemplate
metadata:
  name: in-memory-runtimesdk-default-worker-machinetemplate
spec:
  template:
    spec:
      backend:
        inMemory:
          vm:
            provisioning:
              startupDuration: "10s"
              startupJitter: "0.2"
          node:
            provisioning:
              startupDuration: "2s"
              startupJitter: "0.2"
          apiServer:
            provisioning:
              startupDuration: "2s"
              startupJitter: "0.2"
          etcd:
            provisioning:
              startupDuration: "2s"
              startupJitter: "0.2"
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta2
kind: KubeadmConfigTemplate
metadata:
  name: in-memory-runtimesdk-default-worker-bootstraptemplate
---
apiVersion: cluster.x-k8s.io/v1beta2
kind: ClusterClass
metadata:
  name: in-memory-runtimesdk
spec:
  controlPlane:
    machineInfrastructure:
      templateRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
        kind: DevMachineTemplate
        name: in-memory-runtimesdk-control-plane
    templateRef:
      apiVersion: controlplane.cluster.x-k8s.io/v1beta2
      kind: KubeadmControlPlaneTemplate
      name: in-memory-runtimesdk-control-plane
    healthCheck:
      checks:
        unhealthyNodeConditions:
          - type: Ready
            status: "Unknown"
            timeoutSeconds: 300
          - type: Ready
            status: "False"
            timeoutSeconds: 300
  infrastructure:
    templateRef:
      apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
      kind: DevClusterTemplate
      name: in-memory-runtimesdk-cluster
  workers:
    machineDeployments:
      - class: default-worker
        bootstrap:
          templateRef:
            apiVersion: bootstrap.cluster.x-k8s.io/v1beta2
            kind: KubeadmConfigTemplate
            name: in-memory-runtimesdk-default-worker-bootstraptemplate
        infrastructure:
          templateRef:
            apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
            kind: DevMachineTemplate
            name: in-memory-runtimesdk-default-worker-machinetemplate
        healthCheck:
          checks:
            unhealthyNodeConditions:
              - type: Ready
                status: "Unknown"
                timeoutSeconds: 300
              - type: Ready
                status: "False"
                timeoutSeconds: 300
  patches:
  - name: test-patch
    external:
      generatePatchesExtension: generate-patches.${EXTENSION_CONFIG_NAME:-k8s-upgrade-with-runtimesdk}
      validateTopologyExtension: validate-topology.${EXTENSION_CONFIG_NAME:-k8s-upgrade-with-runtimesdk}
      discoverVariablesExtension: discover-variables.${EXTENSION_CONFIG_NAME:-k8s-upgrade-with-runtimesdk}
  upgrade:
    external:
      generateUpgradePlanExtension: generate-upgrade-plan.${EXTENSION_CONFIG_NAME:-k8s-upgrade-with-runtimesdk}
