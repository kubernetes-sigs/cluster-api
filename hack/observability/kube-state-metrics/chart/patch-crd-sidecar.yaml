apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-state-metrics
spec:
  template:
    spec:
      containers:
      - env:
        - name: LABEL
          value: kube-state-metrics/custom-resource
        - name: FOLDER
          value: /tmp
        - name: RESOURCE
          value: configmap
        - name: NAMESPACE
          value: observability
        - name: SCRIPT
          value: /script/compile.sh
        image: kiwigrid/k8s-sidecar:latest
        name: crd-sidecar
        volumeMounts:
        - mountPath: /etc/config
          name: config-volume
        - mountPath: /script
          name: compile-script
      initContainers:
      - command:
        - /bin/sh
        - -c
        - |
          cat << EOF > "/etc/config/crd-config.yaml"
          kind: CustomResourceStateMetrics
          spec:
            resources: []
          EOF
        image: kiwigrid/k8s-sidecar:latest
        name: init-crd-config
        volumeMounts:
        - mountPath: /etc/config
          name: config-volume
      volumes:
      - configMap:
          defaultMode: 511
          name: kube-state-metrics-crd-sidecar-script
        name: compile-script